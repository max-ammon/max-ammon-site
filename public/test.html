<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connection test — max-ammon.com</title>
<style>
  body { margin:0; min-height:100vh; display:flex; flex-direction:column;
         align-items:center; justify-content:center; gap:24px;
         background:#5a5a5a; color:#e8e8e8;
         font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; text-align:center; }
  h1 { margin:0; font-size:clamp(2rem,7vw,4.5rem); font-weight:700; letter-spacing:.02em; }
  p  { margin:0; color:#c9c9c9; font-size:1rem; }
  #t { font-variant-numeric:tabular-nums; font-size:1.25rem; color:#fff; }
  a  { color:#cfe8ff; }
</style>
</head>
<body>
  <h1>It works</h1>
  <p>Connection test page — this page loads nothing but itself: no images, no fonts, no scripts.</p>
  <p id="t">measuring…</p>
  <p><a href="/">go to the real site →</a></p>
<script>
  // How long the page itself took, so "slow" can be measured rather than guessed.
  addEventListener('load', function () {
    var n = performance.getEntriesByType('navigation')[0];
    var ms = n ? Math.round(n.responseEnd - n.startTime) : Math.round(performance.now());
    var bytes = n && n.transferSize ? n.transferSize : 0;
    document.getElementById('t').textContent =
      'loaded in ' + ms + ' ms' + (bytes ? ' · ' + bytes + ' bytes' : '');
  });
</script>
</body>
</html>
